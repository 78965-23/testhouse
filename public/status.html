<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status – CertPortal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><i class="fas fa-award"></i>CertPortal</div>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="apply.html">Apply</a></li>
                    <li><a href="status.html" class="active">Track</a></li>
                    <li><a href="download.html">Download</a></li>
                    <li><a href="admin.html" class="btn-admin">🔐 Admin</a></li>
                </ul>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>
    </header>

    <section class="status-section">
        <div class="container">
            <h2>Track Your <span>Application</span></h2>
            <p class="sub">Enter your Reference Number to check the current status</p>
            <div class="status-box">
                <input type="text" id="refInput" placeholder="e.g. REF-12345678-ABC12" />
                <button onclick="trackStatus()"><i class="fas fa-search"></i> Check Status</button>
            </div>
            <div id="statusResult" class="status-result"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom"><p>All Rights Reserved @dEMO</p></div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        async function trackStatus() {
            const ref = document.getElementById('refInput').value.trim();
            const result = document.getElementById('statusResult');

            if (!ref) {
                result.innerHTML = '<div class="status-error"><i class="fas fa-exclamation-circle"></i> Please enter a reference number.</div>';
                return;
            }

            try {
                const res = await fetch('/api/applications');
                const apps = await res.json();
                const app = apps.find(a => a.referenceNumber === ref);

                if (!app) {
                    result.innerHTML = '<div class="status-error"><i class="fas fa-times-circle"></i> No application found with this reference number.</div>';
                    return;
                }

                const statusMap = {
                    pending: '⏳ Pending Review',
                    approved: '✅ Approved',
                    rejected: '❌ Rejected'
                };
                const statusClass = {
                    pending: 'pending',
                    approved: 'approved',
                    rejected: 'rejected'
                };

                result.innerHTML = `
                    <div class="status-card">
                        <div class="status-header">
                            <span class="status-badge ${statusClass[app.status] || 'pending'}">${statusMap[app.status] || app.status}</span>
                            <span class="ref-num">${app.referenceNumber}</span>
                        </div>
                        <div class="status-body">
                            <p><strong>Name:</strong> ${app.fullName}</p>
                            <p><strong>Certificate:</strong> ${app.certificateName}</p>
                            <p><strong>Submitted:</strong> ${new Date(app.submittedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}</p>
                            ${app.status === 'approved' ? `
                                <p style="color:#28a745;font-weight:600;margin-top:10px;">
                                    <i class="fas fa-check-circle"></i> Certificate Approved! 
                                    Download it from the <a href="download.html" style="color:#6C63FF;font-weight:600;">Download</a> page.
                                </p>
                            ` : ''}
                            ${app.status === 'rejected' ? `
                                <p style="color:#dc3545;font-weight:600;margin-top:10px;">
                                    <i class="fas fa-times-circle"></i> Application was not approved. Contact support for details.
                                </p>
                            ` : ''}
                            ${app.status === 'pending' ? `
                                <p style="color:#856404;font-weight:600;margin-top:10px;">
                                    <i class="fas fa-clock"></i> Your application is under review. You will be notified within 7 working days.
                                </p>
                            ` : ''}
                        </div>
                    </div>
                `;
            } catch (err) {
                result.innerHTML = `<div class="status-error"><i class="fas fa-exclamation-circle"></i> Server error: ${err.message}</div>`;
            }
        }

        document.getElementById('refInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') trackStatus();
        });
    </script>
</body>
</html>
