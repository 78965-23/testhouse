<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – CertPortal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Admin-specific styles */
        .admin-login {
            max-width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        .admin-login input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ddd;
            border-radius: 14px;
            font-size: 1rem;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }
        .admin-login input:focus {
            outline: none;
            border-color: #6C63FF;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }
        .admin-login button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6C63FF, #3f3d9e);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .admin-login button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.3);
        }
        .admin-panel {
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .admin-panel h2 {
            margin: 20px 0;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .stat-card .num {
            font-size: 2.2rem;
            font-weight: 700;
            color: #6C63FF;
        }
        .stat-card .label {
            color: #4a4a6a;
            font-size: 0.9rem;
        }
        .admin-table-wrap {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow-x: auto;
            padding: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: rgba(108, 99, 255, 0.08);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid rgba(108, 99, 255, 0.15);
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            vertical-align: middle;
        }
        tr:hover {
            background: rgba(108, 99, 255, 0.04);
        }
        .badge {
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }
        .badge-approved {
            background: #d4edda;
            color: #155724;
        }
        .badge-rejected {
            background: #f8d7da;
            color: #721c24;
        }
        .actions button {
            padding: 5px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            margin: 2px;
            transition: 0.3s;
        }
        .actions button:hover {
            transform: scale(1.05);
        }
        .btn-approve {
            background: #28a745;
            color: #fff;
        }
        .btn-approve:hover {
            background: #218838;
        }
        .btn-reject {
            background: #dc3545;
            color: #fff;
        }
        .btn-reject:hover {
            background: #c82333;
        }
        .btn-view {
            background: #007bff;
            color: #fff;
        }
        .btn-view:hover {
            background: #0056b3;
        }
        .btn-generate {
            background: #6C63FF;
            color: #fff;
        }
        .btn-generate:hover {
            background: #3f3d9e;
        }
        .btn-final {
            background: #28a745;
            color: #fff;
        }
        .btn-final:hover {
            background: #218838;
        }
        .btn-logout {
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background: #5a6268;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 24px;
            max-width: 700px;
            width: 95%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-content .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #999;
            transition: 0.3s;
        }
        .modal-content .close:hover {
            color: #333;
        }
        .modal-content p {
            margin: 6px 0;
            line-height: 1.6;
        }
        .modal-content strong {
            display: inline-block;
            width: 150px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .header-row .left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .header-row input {
            padding: 10px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            min-width: 200px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }
        .header-row input:focus {
            outline: none;
            border-color: #6C63FF;
        }
        .header-row select {
            padding: 10px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }
        .btn-sm {
            padding: 6px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-sm:hover {
            transform: scale(1.04);
        }
        .progress-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .progress-overlay.show {
            display: flex;
        }
        .progress-box {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .progress-box .spinner {
            font-size: 3rem;
            color: #6C63FF;
            margin-bottom: 15px;
        }
        .progress-box h3 {
            margin-bottom: 10px;
        }
        .progress-track {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 8px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-track .bar {
            height: 100%;
            background: linear-gradient(135deg, #6C63FF, #3f3d9e);
            border-radius: 8px;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-box .sub {
            color: #666;
            font-size: 0.9rem;
        }
        .edit-area {
            margin: 15px 0;
        }
        .edit-area label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: #1a1a2e;
        }
        .edit-area input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .edit-area input:focus {
            outline: none;
            border-color: #6C63FF;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }
        .cert-preview-container {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            background: #faf8f5;
            overflow: auto;
            max-height: 500px;
        }
        @media (max-width: 600px) {
            td, th {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            .modal-content p {
                font-size: 0.85rem;
            }
            .modal-content strong {
                width: 100px;
            }
            .admin-login {
                margin: 40px 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><i class="fas fa-award"></i>CertPortal</div>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="apply.html">Apply</a></li>
                    <li><a href="status.html">Track</a></li>
                    <li><a href="download.html">Download</a></li>
                    <li><a href="admin.html" class="btn-admin active">🔐 Admin</a></li>
                </ul>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- ===== ADMIN LOGIN ===== -->
    <div id="adminLogin" class="admin-login">
        <i class="fas fa-lock" style="font-size:3rem;color:#6C63FF;margin-bottom:15px;"></i>
        <h2 style="margin-bottom:5px;">Admin Access</h2>
        <p style="color:#666;margin-bottom:20px;">Enter password to manage applications</p>
        <input type="password" id="adminPass" placeholder="Enter password..." />
        <button onclick="loginAdmin()"><i class="fas fa-unlock"></i> Login</button>
        <div id="loginError" style="color:#dc3545;margin-top:10px;display:none;">Wrong password. Try again.</div>
        <div style="margin-top:15px;font-size:0.8rem;color:#999;">Password: 08092003</div>
    </div>

    <!-- ===== ADMIN PANEL ===== -->
    <div id="adminPanel" class="admin-panel">
        <div class="header-row">
            <h2><i class="fas fa-tasks" style="color:#6C63FF;"></i> Applications</h2>
            <button class="btn-logout" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="admin-stats" id="stats"></div>

        <div class="header-row">
            <div class="left">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, email, ref..." onkeyup="loadTable()" />
                <select id="filterStatus" onchange="loadTable()">
                    <option value="all">All Status</option>
                    <option value="pending">⏳ Pending</option>
                    <option value="approved">✅ Approved</option>
                    <option value="rejected">❌ Rejected</option>
                </select>
            </div>
            <button onclick="loadTable()" style="padding:8px 20px;background:#6C63FF;color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:600;transition:0.3s;">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div class="admin-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Certificate</th>
                        <th>Status</th>
                        <th>Ref No.</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ===== DETAIL MODAL ===== -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3><i class="fas fa-user-circle" style="color:#6C63FF;"></i> Application Details</h3>
            <div id="detailContent"></div>
            <div id="certActionArea" style="margin-top:20px;border-top:1px solid #eee;padding-top:20px;"></div>
        </div>
    </div>

    <!-- ===== PROGRESS OVERLAY ===== -->
    <div id="progressOverlay" class="progress-overlay">
        <div class="progress-box">
            <div class="spinner"><i class="fas fa-spinner fa-spin"></i></div>
            <h3 id="progressTitle">Generating...</h3>
            <div class="progress-track"><div class="bar" id="progressBar"></div></div>
            <p class="sub" id="progressSub">Please wait</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const ADMIN_PASS = '08092003';

        // ---------- LOGIN ----------
        function loginAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASS) {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                localStorage.setItem('adminAccess', 'granted');
                loadTable();
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => document.getElementById('loginError').style.display = 'none', 3000);
            }
        }

        if (localStorage.getItem('adminAccess') === 'granted') {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadTable();
        }

        function logoutAdmin() {
            localStorage.removeItem('adminAccess');
            location.reload();
        }

        // ---------- API HELPERS ----------
        async function fetchApps() {
            const res = await fetch('/api/applications');
            return res.json();
        }

        async function updateApp(id, data) {
            const res = await fetch(`/api/applications/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        // ---------- LOAD TABLE ----------
        async function loadTable() {
            const apps = await fetchApps();
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterStatus').value;

            let filtered = apps;
            if (search) {
                filtered = filtered.filter(a =>
                    (a.fullName || '').toLowerCase().includes(search) ||
                    (a.email || '').toLowerCase().includes(search) ||
                    (a.referenceNumber || '').toLowerCase().includes(search)
                );
            }
            if (filter !== 'all') {
                filtered = filtered.filter(a => a.status === filter);
            }

            // Stats
            const total = apps.length;
            const pending = apps.filter(a => a.status === 'pending').length;
            const approved = apps.filter(a => a.status === 'approved').length;
            const rejected = apps.filter(a => a.status === 'rejected').length;

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="num">${total}</div><div class="label">Total</div></div>
                <div class="stat-card"><div class="num">${pending}</div><div class="label">Pending</div></div>
                <div class="stat-card"><div class="num">${approved}</div><div class="label">Approved</div></div>
                <div class="stat-card"><div class="num">${rejected}</div><div class="label">Rejected</div></div>
            `;

            const tbody = document.getElementById('tableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">No applications found</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map((a, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${a.fullName || 'N/A'}</strong></td>
                    <td>${a.email || 'N/A'}</td>
                    <td>${a.certificateName || a.certificateType || 'N/A'}</td>
                    <td><span class="badge badge-${a.status || 'pending'}">${(a.status || 'pending').charAt(0).toUpperCase() + (a.status || 'pending').slice(1)}</span></td>
                    <td style="font-size:0.75rem;color:#666;">${a.referenceNumber || 'N/A'}</td>
                    <td class="actions">
                        <button class="btn-view" onclick="viewDetails(${a.id})"><i class="fas fa-eye"></i></button>
                        ${a.status === 'pending' ? `<button class="btn-generate" onclick="generateCertPreview(${a.id})"><i class="fas fa-file-pdf"></i> Review</button>` : ''}
                        ${a.status === 'pending' ? `<button class="btn-reject" onclick="changeStatus(${a.id},'rejected')"><i class="fas fa-times"></i> Reject</button>` : ''}
                        ${a.status === 'approved' ? `<span style="color:#28a745;font-weight:600;">✅ Approved</span>` : ''}
                        ${a.status === 'rejected' ? `<span style="color:#dc3545;font-weight:600;">❌ Rejected</span>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        // ---------- VIEW DETAILS ----------
        async function viewDetails(id) {
            const apps = await fetchApps();
            const a = apps.find(app => app.id === id);
            if (!a) return;

            const fields = Object.keys(a).filter(k =>
                !['id', 'status', 'submittedAt', 'approvedAt', 'certificateNumber', 'referenceNumber', 'certificateType', 'certificateName'].includes(k)
            );

            let html = `
                <p><strong>Reference:</strong> ${a.referenceNumber || 'N/A'}</p>
                <p><strong>Certificate:</strong> ${a.certificateName || a.certificateType || 'N/A'}</p>
                <p><strong>Status:</strong> ${(a.status || 'pending').toUpperCase()}</p>
                <p><strong>Submitted:</strong> ${a.submittedAt ? new Date(a.submittedAt).toLocaleString() : 'N/A'}</p>
            `;
            if (a.approvedAt) html += `<p><strong>Approved:</strong> ${new Date(a.approvedAt).toLocaleString()}</p>`;
            if (a.certificateNumber) html += `<p><strong>Certificate No:</strong> ${a.certificateNumber}</p>`;
            fields.forEach(f => {
                if (a[f]) html += `<p><strong>${f.replace(/([A-Z])/g, ' $1').trim().toUpperCase()}:</strong> ${a[f]}</p>`;
            });

            document.getElementById('detailContent').innerHTML = html;

            let actionHTML = '';
            if (a.status === 'pending') {
                actionHTML = `
                    <button class="btn-generate btn-sm" onclick="generateCertPreview(${a.id})"><i class="fas fa-file-pdf"></i> Generate Preview</button>
                    <button class="btn-reject btn-sm" onclick="changeStatus(${a.id},'rejected')"><i class="fas fa-times"></i> Reject</button>
                `;
            } else if (a.status === 'approved') {
                actionHTML = `<p style="color:#28a745;font-weight:600;"><i class="fas fa-check-circle"></i> Approved. Certificate No: ${a.certificateNumber}</p>`;
            } else {
                actionHTML = `<p style="color:#dc3545;"><i class="fas fa-times-circle"></i> Rejected.</p>`;
            }
            document.getElementById('certActionArea').innerHTML = actionHTML;
            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.getElementById('adminPass').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') loginAdmin();
        });

        // ---------- GENERATE CERTIFICATE PREVIEW ----------
        async function generateCertPreview(id) {
            const apps = await fetchApps();
            const app = apps.find(a => a.id === id);
            if (!app) return;

            const overlay = document.getElementById('progressOverlay');
            overlay.classList.add('show');
            const bar = document.getElementById('progressBar');
            const title = document.getElementById('progressTitle');
            const sub = document.getElementById('progressSub');
            bar.style.width = '0%';
            title.textContent = 'Generating Preview...';
            sub.textContent = 'Please wait';

            let pct = 0;
            const interval = setInterval(() => {
                pct += Math.random() * 10 + 5;
                if (pct > 90) pct = 90;
                bar.style.width = pct + '%';
            }, 200);

            const certNum = app.certificateNumber || generateCertNum();
            const issueDate = app.approvedAt ? new Date(app.approvedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }) : new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
            const certName = app.certificateName || app.certificateType || 'Certificate of Recognition';
            const fullName = app.fullName || 'Applicant';

            const certHTML = `
                <div style="width:800px; padding:50px; background:#faf8f5; border:4px solid #2c3e50; box-shadow:inset 0 0 0 2px #2c3e50; font-family:'Times New Roman',serif; margin:0 auto; text-align:center; min-height:500px; display:flex; flex-direction:column; justify-content:center; position:relative;">
                    <div style="position:absolute; top:15px; left:0; right:0; font-size:14px; color:#2c3e50; letter-spacing:2px; border-bottom:1px solid #2c3e50; padding-bottom:8px;">OFFICE OF THE COMMISSIONER</div>
                    <div style="margin-top:30px;"><span style="font-size:16px; color:#2c3e50; letter-spacing:4px;">★</span></div>
                    <h1 style="font-size:26px; color:#2c3e50; letter-spacing:2px; margin:5px 0 10px; font-weight:600; text-transform:uppercase;">Certificate</h1>
                    <p style="font-size:13px; color:#555; letter-spacing:4px; margin:0 0 15px;">No. ${certNum}</p>
                    <p style="font-size:16px; color:#333; letter-spacing:1px; margin:5px 0;">THIS IS TO CERTIFY THAT</p>
                    <h2 style="font-size:36px; color:#1a1a1a; letter-spacing:2px; margin:5px 0; font-weight:600; text-decoration:underline; text-underline-offset:8px;">${fullName}</h2>
                    <p style="font-size:16px; color:#333; letter-spacing:1px; margin:15px 0 5px;">has been officially recognized as</p>
                    <h3 style="font-size:26px; color:#2c3e50; letter-spacing:2px; margin:5px 0 20px; font-weight:500; text-decoration:underline; text-underline-offset:6px;">${certName}</h3>
                    <p style="font-size:14px; color:#555; margin:5px 0;">on this ${issueDate}</p>
                    <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:15px; font-size:12px; color:#444;">
                        <p><strong>Digitally signed by</strong></p>
                        <p style="font-weight:600; font-size:14px; color:#1a1a1a;">Janamat Sankar, IAS</p>
                        <p style="font-size:11px; color:#777;">Commissioner of Certifications</p>
                    </div>
                    <div style="margin-top:10px; font-size:10px; color:#aaa; letter-spacing:1px;">This certificate is issued by the Office of the Commissioner</div>
                </div>
            `;

            const detailContent = document.getElementById('detailContent');
            const actionArea = document.getElementById('certActionArea');
            detailContent.innerHTML = `
                <div class="cert-preview-container">${certHTML}</div>
                <div style="margin-top:15px; background:#f0f7ff; padding:15px; border-radius:12px; border-left:4px solid #6C63FF;">
                    <p><strong>📋 Preview</strong> – Review and edit if needed before final approval.</p>
                </div>
                <div class="edit-area">
                    <label><i class="fas fa-user-edit"></i> Applicant Name</label>
                    <input type="text" id="editName" value="${fullName}" />
                    <label><i class="fas fa-award"></i> Certificate Title</label>
                    <input type="text" id="editTitle" value="${certName}" />
                </div>
                <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="btn-final btn-sm" onclick="finalApprove(${app.id})"><i class="fas fa-check-circle"></i> ✅ Final Approve</button>
                    <button class="btn-reject btn-sm" onclick="changeStatus(${app.id},'rejected')"><i class="fas fa-times"></i> Reject</button>
                    <button onclick="closeModal()" class="btn-sm" style="background:#6c757d;color:#fff;">Close</button>
                </div>
            `;
            actionArea.innerHTML = '';

            clearInterval(interval);
            bar.style.width = '100%';
            title.textContent = '✅ Preview Ready!';
            sub.textContent = 'Review above.';
            setTimeout(() => {
                overlay.classList.remove('show');
                bar.style.width = '0%';
            }, 800);
        }

        // ---------- FINAL APPROVE ----------
        async function finalApprove(id) {
            const apps = await fetchApps();
            const app = apps.find(a => a.id === id);
            if (!app) return;

            const editedName = document.getElementById('editName')?.value || app.fullName;
            const editedTitle = document.getElementById('editTitle')?.value || app.certificateName;
            const certNum = generateCertNum();

            const updated = {
                fullName: editedName,
                certificateName: editedTitle,
                status: 'approved',
                approvedAt: new Date().toISOString(),
                certificateNumber: certNum
            };

            await updateApp(id, updated);
            closeModal();
            loadTable();
            alert(`✅ Certificate Approved!\nCertificate Number: ${certNum}\nUser can now download using reference or certificate number.`);
        }

        // ---------- CHANGE STATUS ----------
        async function changeStatus(id, newStatus) {
            if (!confirm(`Are you sure you want to ${newStatus} this application?`)) return;
            const updated = { status: newStatus };
            if (newStatus === 'approved') {
                updated.approvedAt = new Date().toISOString();
                updated.certificateNumber = generateCertNum();
            }
            await updateApp(id, updated);
            closeModal();
            loadTable();
            if (newStatus === 'approved') {
                alert(`✅ Application approved!\nCertificate Number: ${updated.certificateNumber}\nUser can download the certificate.`);
            }
        }

        document.addEventListener('DOMContentLoaded', loadTable);
    </script>
</body>
</html>
